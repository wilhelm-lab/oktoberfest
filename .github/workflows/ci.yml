name: CI

# Runs on pushes to the main integration branches and on every pull request.
on:
    workflow_dispatch: # Allow manual triggering from the GitHub Actions tab.
    push:
        # release/* trigger is there just in case someone uses a release branch
        # but we opt for a simpler approach to release from development and
        # merge that tagged commit to main instead of creating a separate release branch.
        branches: [main, development, "release/*"]
    pull_request:
        branches:
            - "**"

# ---------------------------------------------------------------------------
# Shared setup used by every job that needs Poetry + the project installed.
# ---------------------------------------------------------------------------

jobs:
    # ------------------------------------------------------------------
    # Lint — ruff check + ruff format (runs once, ubuntu/py3.12 only)
    # ------------------------------------------------------------------
    lint:
        name: lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
                  cache: pip

            - name: Install Poetry
              run: pip install poetry

            - name: Validate pyproject.toml
              run: poetry check

            - name: Install dependencies
              run: poetry install --with dev

            - name: Lint with ruff
              run: make lint

    # -----------------------------------------------------------------------
    # 2. Tests — pytest with coverage, across all supported Python versions.
    #    Each matrix entry uploads its own coverage file so they can be
    #    combined in the `coverage` job below.
    # -----------------------------------------------------------------------
    test:
        name: Test (Python ${{ matrix.python-version }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.10", "3.11", "3.12"]

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@v6
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install Poetry
              run: pip install poetry

            - name: Cache Poetry virtualenv
              uses: actions/cache@v5
              with:
                  path: ~/.cache/pypoetry/virtualenvs
                  key: poetry-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}
                  restore-keys: poetry-${{ runner.os }}-py${{ matrix.python-version }}-

            - name: Install project and dependencies
              run: poetry install

            - name: Run tests with coverage
              run: make test

            - name: Generate coverage report
              if: matrix.python-version == '3.12'
              run: make coverage

            - name: Upload coverage
              if: matrix.python-version == '3.12'
              uses: codecov/codecov-action@v7
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: coverage.xml
                  fail_ci_if_error: false

    # -----------------------------------------------------------------------
    # 3. Runtime type checking — runs the test suite through typeguard.
    #    Python 3.12 only (latest supported version).
    # -----------------------------------------------------------------------
    typeguard:
        name: Type checking (typeguard)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"

            - name: Install Poetry
              run: pip install poetry

            - name: Cache Poetry virtualenv
              uses: actions/cache@v5
              with:
                  path: ~/.cache/pypoetry/virtualenvs
                  key: poetry-${{ runner.os }}-py3.12-${{ hashFiles('poetry.lock') }}
                  restore-keys: poetry-${{ runner.os }}-py3.12-

            - name: Install project and dependencies
              run: poetry install

            - name: Run typeguard
              run: make typecheck

    # -----------------------------------------------------------------------
    # 4. Doctest examples — validates inline code examples in all docstrings.
    #    Python 3.12 (latest supported version).
    # -----------------------------------------------------------------------
    xdoctest:
        name: Doctest examples (xdoctest)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"

            - name: Install Poetry
              run: pip install poetry

            - name: Cache Poetry virtualenv
              uses: actions/cache@v5
              with:
                  path: ~/.cache/pypoetry/virtualenvs
                  key: poetry-${{ runner.os }}-py3.12-${{ hashFiles('poetry.lock') }}
                  restore-keys: poetry-${{ runner.os }}-py3.12-

            - name: Install project and dependencies
              run: poetry install

            - name: Run xdoctest
              run: make doctest
