name: Publish oktoberfest to PyPI

# Triggered automatically when a GitHub Release is published.
on:
    release:
        types: [published]

# Never cancel a release publish once started.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

# Required for PyPI Trusted Publishing (OIDC) — no PYPI_TOKEN secret needed.
permissions:
    id-token: write

jobs:
    release:
        name: Release
        runs-on: ubuntu-latest
        steps:
            - name: Check out the repository
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
                  cache: pip

            - name: Install Poetry
              run: |
                  pip install poetry
                  poetry --version

            - name: Build package
              run: poetry build --ansi

            - name: Publish package on PyPI
              uses: pypa/gh-action-pypi-publish@v1.13.0
