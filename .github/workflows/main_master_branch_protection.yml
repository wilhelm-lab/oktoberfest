name: PR to master branch from patch/release branch only

on:
    pull_request:
        branches:
            - master
            - main

jobs:
    check_target:
        runs-on: ubuntu-latest
        name: Check Target branch
        steps:
            # PRs to the repository master branch are only ok if coming from any patch or release branch
            - name: Check PRs
              run: |
                  { [[ $GITHUB_HEAD_REF = *"release"* ]]; } || [[ $GITHUB_HEAD_REF == *"patch"* ]]

            # If the above check failed, post a comment on the PR explaining the failure
            # NOTE - this may not work if the PR is coming from a fork, due to limitations in GitHub actions secrets
            - name: Post PR comment
              if: failure()
              uses: mshick/add-pr-comment@v2
              with:
                  message: |
                      Hi @${{ github.event.pull_request.user.login }},

                      It looks like this pull-request is has been made against the ${{github.event.pull_request.head.repo.full_name}} `master` or `main` branch.
                      The `master`/`main` branch should always contain code from the latest release.
                      Because of this, PRs to `master`/`main` are only allowed if they come from any ${{github.event.pull_request.head.repo.full_name}} `release` or `patch` branch.

                      You do not need to close this PR, you can change the target branch to `development` by clicking the _"Edit"_ button at the top of this page.

                      Thanks again for your contribution!
                  repo-token: ${{ secrets.GITHUB_TOKEN }}
                  allow-repeats: false

    check_version:
        name: No pre-release version on main branch
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            # Reads the version directly from pyproject.toml using stdlib tomllib
            # (no external packages needed). Rejects any pre-release marker:
            # dev, alpha, beta, rc, a, b, or SNAPSHOT.
            - name: Check project version is a release version
              run: |
                  python - <<'EOF'
                  import tomllib, re, sys
                  with open("pyproject.toml", "rb") as f:
                      version = tomllib.load(f)["tool"]["poetry"]["version"]
                  if re.search(r'(dev|alpha|beta|rc|\.a\d|\.b\d|SNAPSHOT)', version, re.IGNORECASE):
                      print(f"::error::Version '{version}' is a pre-release. Merge to main requires a final release version.")
                      sys.exit(1)
                  print(f"Version '{version}' is a release version. OK.")
                  EOF

            - name: Post PR comment
              if: failure()
              uses: mshick/add-pr-comment@v2
              with:
                  message: |
                      Hi @${{ github.event.pull_request.user.login }},

                      The version in `pyproject.toml` must be a **final release version** (no `dev`, `alpha`, `beta`, `rc`, or `SNAPSHOT` suffix) before merging to `main`.

                      Please bump the version to a release version and push again.
                  repo-token: ${{ secrets.GITHUB_TOKEN }}
                  allow-repeats: false
