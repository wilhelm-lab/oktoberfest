# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

# Set the OS, Python version and other tools you might need
build:
    os: ubuntu-22.04
    tools:
        python: "3.12"
    jobs:
        pre_install:
            - pip install poetry
        install:
            - poetry install --with docs

# Build documentation in the "docs/" directory with Sphinx
sphinx:
    configuration: docs/conf.py

# Only build HTML format (default)
# PDF/ePub builds are rarely used and can be enabled later if needed
# uncomment the following line and specify the formats you want to build
# formats: all
formats: []
