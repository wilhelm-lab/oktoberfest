version: "3.9"

services:
    redis:
        image: redis:7-alpine
        ports:
            - "6379:6379"
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 5

    api:
        build:
            context: .
            dockerfile: backend/Dockerfile
        command: uvicorn app.main:app --host 0.0.0.0 --port 8000
        env_file:
            - .env
        environment:
            APP_MODE: local
            DATABASE_URL: sqlite:////data/app.db
            DATA_DIR: /data
            REDIS_URL: redis://redis:6379/0
        volumes:
            - okt-data:/data
        ports:
            - "8000:8000"
        depends_on:
            redis:
                condition: service_healthy

    worker:
        build:
            context: .
            dockerfile: backend/Dockerfile
        command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=1
        env_file:
            - .env
        environment:
            APP_MODE: local
            DATABASE_URL: sqlite:////data/app.db
            DATA_DIR: /data
            REDIS_URL: redis://redis:6379/0
        volumes:
            - okt-data:/data
        depends_on:
            redis:
                condition: service_healthy

volumes:
    okt-data:
